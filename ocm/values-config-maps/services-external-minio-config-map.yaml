apiVersion: v1
data:
  values.yaml: |
    apiIngress:
      annotations:
        nginx.ingress.kubernetes.io/proxy-body-size: 4G
        nginx.org/client-max-body-size: 4G
      enabled: true
      extraTls:
        - hosts:
            - objectstore.opendesk.internal
          secretName: opendesk-certificates-tls
      hostname: objectstore.opendesk.internal
      ingressClassName: nginx
    auth:
      rootPassword: REDACTED
    commonAnnotations: null
    containerSecurityContext:
      allowPrivilegeEscalation: false
      capabilities:
        drop:
          - ALL
      enabled: true
      privileged: false
      readOnlyRootFilesystem: true
      runAsGroup: 1001
      runAsNonRoot: true
      runAsUser: 1001
      seLinuxOptions: null
      seccompProfile:
        type: RuntimeDefault
    global:
      imagePullSecrets: []
      security:
        allowInsecureImages: true
    image:
      pullPolicy: IfNotPresent
      registry: registry-1.docker.io
      repository: bitnami/minio
      tag: 2025.4.22-debian-12-r1@sha256:d7cd0e172c4cc0870f4bdc3142018e2a37be9acf04d68f386600daad427e0cab
    livenessProbe:
      enabled: true
      initialDelaySeconds: 5
      periodSeconds: 10
      timeoutSeconds: 10
    metrics:
      serviceMonitor:
        additionalLabels:
          release: kube-prometheus-stack
        enabled: false
    mode: standalone
    networkPolicy:
      enabled: false
    persistence:
      annotations: null
      size: 10Gi
      storageClass: null
    podAnnotations: null
    podSecurityContext:
      enabled: true
      fsGroup: 1001
    provisioning:
      buckets:
        - name: migrations
          versioning: Suspended
          withLock: false
        - name: nextcloud
          versioning: Suspended
          withLock: false
        - name: notes
          versioning: Versioned
          withLock: false
        - name: openproject
          versioning: Suspended
          withLock: false
        - name: openxchange
          versioning: Suspended
          withLock: false
        - name: ums
          versioning: Suspended
          withLock: false
      cleanupAfterFinished:
        enabled: true
        seconds: 60
      enabled: true
      extraCommands:
        - mc anonymous set download provisioning/ums/portal-assets
      podAnnotations: null
      policies:
        - name: migrations-bucket-policy
          statements:
            - actions:
                - s3:*
              effect: Allow
              resources:
                - arn:aws:s3:::migrations
            - actions:
                - s3:*
              effect: Allow
              resources:
                - arn:aws:s3:::migrations/*
        - name: nextcloud-bucket-policy
          statements:
            - actions:
                - s3:*
              effect: Allow
              resources:
                - arn:aws:s3:::nextcloud
            - actions:
                - s3:*
              effect: Allow
              resources:
                - arn:aws:s3:::nextcloud/*
        - name: notes-bucket-policy
          statements:
            - actions:
                - s3:*
              effect: Allow
              resources:
                - arn:aws:s3:::notes
            - actions:
                - s3:*
              effect: Allow
              resources:
                - arn:aws:s3:::notes/*
        - name: openproject-bucket-policy
          statements:
            - actions:
                - s3:*
              effect: Allow
              resources:
                - arn:aws:s3:::openproject
            - actions:
                - s3:*
              effect: Allow
              resources:
                - arn:aws:s3:::openproject/*
        - name: openxchange-bucket-policy
          statements:
            - actions:
                - s3:*
              effect: Allow
              resources:
                - arn:aws:s3:::openxchange
            - actions:
                - s3:*
              effect: Allow
              resources:
                - arn:aws:s3:::openxchange/*
        - name: ums-bucket-policy
          statements:
            - actions:
                - s3:*
              effect: Allow
              resources:
                - arn:aws:s3:::ums
            - actions:
                - s3:*
              effect: Allow
              resources:
                - arn:aws:s3:::ums/*
      resources:
        limits:
          cpu: 99
          memory: 2Gi
        requests:
          cpu: 0.25
          memory: 256Mi
      users:
        - disabled: false
          password: REDACTED
          policies:
            - migrations-bucket-policy
          setPolicies: true
          username: migration_user
        - disabled: false
          password: REDACTED
          policies:
            - nextcloud-bucket-policy
          setPolicies: true
          username: nextcloud_user
        - disabled: false
          password: REDACTED
          policies:
            - notes-bucket-policy
          setPolicies: true
          username: notes_user
        - disabled: false
          password: REDACTED
          policies:
            - openproject-bucket-policy
          setPolicies: true
          username: openproject_user
        - disabled: false
          password: REDACTED
          policies:
            - openxchange-bucket-policy
          setPolicies: true
          username: openxchange_user
        - disabled: false
          password: REDACTED
          policies:
            - ums-bucket-policy
          setPolicies: true
          username: ums_user
    readinessProbe:
      enabled: true
      initialDelaySeconds: 5
      periodSeconds: 10
      timeoutSeconds: 10
    resources:
      limits:
        cpu: 99
        memory: 2Gi
      requests:
        cpu: 0.25
        memory: 256Mi
    service:
      annotations: null
      headless:
        annotations: null
    serviceAccount:
      annotations: null
    startupProbe:
      enabled: true
      periodSeconds: 10
      timeoutSeconds: 10
    statefulset:
      drivesPerNode: 1
      replicaCount: 1
    volumePermissions:
      enabled: true
      image:
        pullPolicy: IfNotPresent
        registry: registry-1.docker.io
        repository: bitnami/os-shell
        tag: 12-debian-12-r44@sha256:6388c7c27a09472906e2f2094410c9ffdadf23b4b242293ce023d0314ec10920
kind: ConfigMap
metadata:
  name: services-external-minio-config-map
